<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veg Food Delivery</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f8f8f8;
    }

    header {
        background: #2e7d32;
        color: white;
        padding: 15px;
        text-align: center;
    }

    .logo {
        font-size: 28px;
        font-weight: bold;
    }

    .container {
        padding: 20px;
    }

    h2 {
        text-align: center;
        color: #2e7d32;
    }

    .menu {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .item {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        text-align: center;
    }

    .item img {
        width: 100%;
        border-radius: 10px;
    }

    .item h3 {
        margin: 10px 0;
    }

    .price {
        color: #e65100;
        font-weight: bold;
    }

    .order-btn {
        background: #ff5722;
        color: white;
        border: none;
        padding: 10px;
        margin-top: 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .order-btn:hover {
        background: #e64a19;
    }

    footer {
        text-align: center;
        padding: 15px;
        background: #2e7d32;
        color: white;
        margin-top: 20px;
    }
</style>

</head>

<body>

<header>
    <div class="logo">🍃 Veggie Express</div>
    <p>Fast & Fresh Food Delivery</p>
</header>

<div class="container">
    <h2>Dinner Menu</h2>

    <div class="menu">

        <div class="item">
            <img src="https://source.unsplash.com/300x200/?paneer" alt="">
            <h3>Paneer Butter Masala</h3>
            <p class="price">₹180</p>
            <button class="order-btn">Order Now</button>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/300x200/?biryani" alt="">
            <h3>Veg Biryani</h3>
            <p class="price">₹150</p>
            <button class="order-btn">Order Now</button>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/300x200/?dal" alt="">
            <h3>Dal Tadka</h3>
            <p class="price">₹120</p>
            <button class="order-btn">Order Now</button>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/300x200/?gobi" alt="">
            <h3>Gobi Manchurian</h3>
            <p class="price">₹140</p>
            <button class="order-btn">Order Now</button>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/300x200/?veg-curry" alt="">
            <h3>Mixed Veg Curry</h3>
            <p class="price">₹130</p>
            <button class="order-btn">Order Now</button>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/300x200/?rice" alt="">
            <h3>Jeera Rice</h3>
            <p class="price">₹100</p>
            <button class="order-btn">Order Now</button>
        </div>

    </div>
</div>

<footer>
    <p>📞 Order Now: +91 9080126135</p>
</footer>

</body>
</html>
